spring:
  application:
    name: real-estate-saas-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:real_estate}
    username: ${DB_USER:real_estate}
    password: ${DB_PASSWORD:real_estate_dev}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

app:
  owner:
    organization-id: ${DEFAULT_ORGANIZATION_ID:00000000-0000-0000-0000-000000000001}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

server:
  port: ${SERVER_PORT:8080}
